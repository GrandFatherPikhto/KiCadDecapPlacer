target_ref: IC1
side: back

thermal_via_array:
  enabled: true
  target_ref: IC1
  pad: '145'
  net: GND
  rows: 4
  cols: 4
  margin_mm: 0.5
  pattern: grid
  drill_mm: 0.3
  diameter_mm: 0.5

# Один шаблон на всё -- вся геометрия локальная (along/across), при
# rotation_deg=0 это выглядело бы как "эталонный" правый борт.
templates:
  cap_pair_left:
    power_via:
      offset_along_mm: 0.0
      offset_across_mm: 1.5
      drill_mm: 0.3
      diameter_mm: 0.6
    component1:                      # "тонкий" (100nF)
      offset_along_mm: -1.0
      offset_across_mm: -1.5
      angle_deg: 90.0
      gnd_via_offset_along_mm: 0.0
      gnd_via_offset_across_mm: -1.0
      gnd_via_net: GND
    component2:                      # "толстый" (4.7uF)
      offset_along_mm: -1.0
      offset_across_mm: 1.5
      angle_deg: 270.0
      gnd_via_offset_along_mm: 0.0
      gnd_via_offset_across_mm: 1.3
      gnd_via_net: GND

  cap_pair_right:
    power_via:
      offset_along_mm: 0.0
      offset_across_mm: 1.5
      drill_mm: 0.3
      diameter_mm: 0.6
    component1:                      # "тонкий" (100nF)
      offset_along_mm: 1.0
      offset_across_mm: -1.5
      angle_deg: 90.0
      gnd_via_offset_along_mm: 0.0
      gnd_via_offset_across_mm: -1.0
      gnd_via_net: GND
    component2:                      # "толстый" (4.7uF)
      offset_along_mm: 1.0
      offset_across_mm: 1.5
      angle_deg: 270.0
      gnd_via_offset_along_mm: 0.0
      gnd_via_offset_across_mm: 1.3
      gnd_via_net: GND

rules:
- net: +3V3_VCCIO
  spokes:
  - pad: '139'
    template: cap_pair_left
    shift_x_mm: 0.0
    shift_y_mm: 0.0
    rotation_deg: 0.0
    component1: C5
    component2: C30

  - pad: '130'
    template: cap_pair_left
    shift_x_mm: 0.0
    shift_y_mm: 0.0
    rotation_deg: 0.0
    component1: C6
    component2: C31

  - pad: '122'
    template: cap_pair_left
    shift_x_mm: -0.7
    shift_y_mm: 0.0
    rotation_deg: 0.0
    component1: C7
    component2: C32

  - pad: '117'
    template: cap_pair_left
    shift_x_mm: -0.7
    shift_y_mm: 0.0
    rotation_deg: 0.0
    component1: C8
    component2: C33

- net: +1V2_VCCINT
  spokes:
  - pad: '134'
    template: cap_pair_left
    shift_x_mm: 0.0
    shift_y_mm: 0.0
    rotation_deg: 0.0
    component1: C19
    component2: C40

  - pad: '116'
    template: cap_pair_right
    shift_x_mm: -0.3
    shift_y_mm: 0.0
    rotation_deg: 0.0
    component1: C20
    component2: C41

- net: +1V2_VCCD_PLL
  spokes:
  # Пад 109 -- в вашем примере rotation_deg такой, что "положительный y"
  # (across) уводил C39 внутрь дворика
  - pad: '109'
    template: cap_pair_left
    shift_x_mm: 0.0
    shift_y_mm: 0.0
    rotation_deg: 0.0
    component1: C38
    component2: C51
  # Пад 62 -- тот самый борт, где раньше знак приходилось переворачивать
  # руками. Теперь -- просто другой rotation_deg, шаблон не меняется.
  - pad: '37'
    template: cap_pair_right
    shift_x_mm: 0.0
    shift_y_mm: 0.0
    rotation_deg: 0.0
    component1: C39
    component2: C52

