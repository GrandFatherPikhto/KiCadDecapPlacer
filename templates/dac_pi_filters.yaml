    template: dac_pi_filter_P3V3_CLKVDD
    anchor_ref: IC601
    anchor_pad: '11'
    origin_x_mm: 4.2
    origin_y_mm: 5.9
    rotation_deg: 90.0
    enabled: true
    params:
      CHANNEL: Channel_0
      DAC_PWR_NET: +3V3_CLKVDD

  - name: dac_filter_ch0_dvdd
    template: dac_pi_filter_P3V3_CLKVDD
    anchor_ref: IC601
    anchor_pad: '3'
    origin_x_mm: 4.2
    origin_y_mm: 5.9
    rotation_deg: 0.0
    enabled: true
    params:
      CHANNEL: Channel_0
      DAC_PWR_NET: +3V3_DVDD

templates:
