target_ref: IC601
side: back

templates:
  dac_pi_filter_P3V3_CLKVDD:
    layer: B.Cu
    vias:
      - offset_along_mm: 0.0
        offset_across_mm: 0.0
        net: +3V3
        drill_mm: 0.4
        diameter_mm: 0.8
      - offset_along_mm: 3.15
        offset_across_mm: -1.14
        net: GND
        drill_mm: 0.4
        diameter_mm: 0.8
      - offset_along_mm: 4.39
        offset_across_mm: -4.2
        net: "/{channel}/DAC Sheet/+3V3_CLKVDD"
        drill_mm: 0.4
        diameter_mm: 0.8
      - offset_along_mm: 0.0
        offset_across_mm: -5.34
        net: GND
        drill_mm: 0.4
        diameter_mm: 0.8
    components:
      - role: DAC_PI_FILTER_FB
        offset_along_mm: 1.975
        offset_across_mm: -2.6725
        angle_deg: 0.0
      - role: DAC_PI_FILTER_C1
        offset_along_mm: 0.87
        offset_across_mm: -1.14
        angle_deg: 0.0
      - role: DAC_PI_FILTER_C3
        offset_along_mm: 2.3525
        offset_across_mm: -4.2
        angle_deg: 180.0
      - role: DAC_PI_FILTER_C2
        offset_along_mm: 0.0075
        offset_across_mm: -3.24
        angle_deg: 90.0

clone_placements:
  - name: dac_filter_ch0
    template: dac_pi_filter_P3V3_CLKVDD
    anchor_ref: IC601
    anchor_pad: '11'
    origin_x_mm: 0.0
    origin_y_mm: 0.0
    rotation_deg: 0.0
    params: { channel: Channel_0 }
    nets:
      DAC_PI_FILTER_FB: "/{channel}/DAC Sheet/+3V3_CLKVDD"
      DAC_PI_FILTER_C1: "+3V3"
      DAC_PI_FILTER_C3: "GND"
      DAC_PI_FILTER_C2: "GND"
    enabled: true

  - name: dac_filter_ch1
    template: dac_pi_filter_P3V3_CLKVDD
    anchor_ref: IC1
    anchor_pad: '26'
    origin_x_mm: 0.0
    origin_y_mm: 0.0
    rotation_deg: 0.0
    params: { channel: Channel_1 }
    nets:
      DAC_PI_FILTER_FB: "/{channel}/DAC Sheet/+3V3_CLKVDD"
      DAC_PI_FILTER_C1: "+3V3"
      DAC_PI_FILTER_C3: "GND"
      DAC_PI_FILTER_C2: "GND"
    enabled: true

  - name: dac_filter_ch2
    template: dac_pi_filter_P3V3_CLKVDD
    anchor_ref: IC1
    anchor_pad: '40'
    origin_x_mm: 0.0
    origin_y_mm: 0.0
    rotation_deg: 0.0
    params: { channel: Channel_2 }
    nets:
      DAC_PI_FILTER_FB: "/{channel}/DAC Sheet/+3V3_CLKVDD"
      DAC_PI_FILTER_C1: "+3V3"
      DAC_PI_FILTER_C3: "GND"
      DAC_PI_FILTER_C2: "GND"
    enabled: true