target_ref: IC601
side: back

templates:
  dac_pi_filter_P3V3_CLKVDD_ch0:
    layer: B.Cu
    vias:
      - offset_along_mm: 0.0
        offset_across_mm: 0.0
        net: +3V3
        drill_mm: 0.4
        diameter_mm: 0.8
      - offset_along_mm: 3.15
        offset_across_mm: -1.14
        net: GND
        drill_mm: 0.4
        diameter_mm: 0.8
      - offset_along_mm: 4.6
        offset_across_mm: -4.2
        net: "/Channel_0/DAC Sheet/+3V3_CLKVDD"   # конкретное имя
        drill_mm: 0.4
        diameter_mm: 0.8
      - offset_along_mm: 0.0
        offset_across_mm: -5.34
        net: GND
        drill_mm: 0.4
        diameter_mm: 0.8
    components:
      - role: DAC_PI_FILTER_FB
        offset_along_mm: 1.975
        offset_across_mm: -2.6725
        angle_deg: 0.0
      - role: DAC_PI_FILTER_C1
        offset_along_mm: 0.87
        offset_across_mm: -1.14
        angle_deg: 0.0
      - role: DAC_PI_FILTER_C3
        offset_along_mm: 2.3525
        offset_across_mm: -4.2
        angle_deg: 180.0
      - role: DAC_PI_FILTER_C2
        offset_along_mm: 0.0075
        offset_across_mm: -3.24
        angle_deg: 90.0

  dac_pi_filter_P3V3_CLKVDD_ch1:
    layer: B.Cu
    vias:
      # ... аналогично, но с /Channel_1/ ...
      - offset_along_mm: 4.6
        offset_across_mm: -4.2
        net: "/Channel_1/DAC Sheet/+3V3_CLKVDD"
      # остальное то же самое

  dac_pi_filter_P3V3_CLKVDD_ch2:
    layer: B.Cu
    vias:
      - offset_along_mm: 4.6
        offset_across_mm: -4.2
        net: "/Channel_2/DAC Sheet/+3V3_CLKVDD"
      # остальное то же самое

clone_placements:
  - name: dac_filter_ch0_clkvdd
    template: dac_pi_filter_P3V3_CLKVDD_ch0
    anchor_ref: IC601
    anchor_pad: '11'
    origin_x_mm: 4.2
    origin_y_mm: 5.9
    rotation_deg: 90.0
    enabled: true
    # nets и params удалены

  - name: dac_filter_ch1_clkvdd
    template: dac_pi_filter_P3V3_CLKVDD_ch1
    anchor_ref: IC601
    anchor_pad: '26'   # предположим, пад для Channel_1
    origin_x_mm: 4.2
    origin_y_mm: 5.9
    rotation_deg: 90.0
    enabled: true

  - name: dac_filter_ch2_clkvdd
    template: dac_pi_filter_P3V3_CLKVDD_ch2
    anchor_ref: IC601
    anchor_pad: '40'
    origin_x_mm: 4.2
    origin_y_mm: 5.9
    rotation_deg: 90.0
    enabled: true