    enabled: true
    params:
      PWR_IN: +3V3
      PWR_OUT: +3V3_VCCIO
    nets:
      PI_FILTER_C1: '{PWR_IN}'
      PI_FILTER_C2: '{PWR_IN}'
      PI_FILTER_FB: '{PWR_OUT}'
      PI_FILTER_C3: '{PWR_OUT}'
      PI_FILTER_C4: '{PWR_OUT}'

  - name: fpga_filter_1v2_vccd_pll
