# pi_filter_4_clone.yaml

templates_file: pi_filter_4_template.yaml

clone_placements:
  - name: fpga_filter_1v2_vccint
    template: pi_filter_4
    anchor_ref: IC1
    anchor_pad: '102'
    origin_x_mm: 7.0
    origin_y_mm: 0.0
    rotation_deg: 90.0
    enabled: true
    params:
      PWR_IN: +1V2
      PWR_OUT: +1V2_VCCINT
    nets:
      PI_FILTER_C1: '{PWR_IN}'
      PI_FILTER_C2: '{PWR_IN}'
      PI_FILTER_FB: '{PWR_OUT}'
      PI_FILTER_C3: '{PWR_OUT}'
      PI_FILTER_C4: '{PWR_OUT}'

  - name: fpga_filter_3v3_vccio
