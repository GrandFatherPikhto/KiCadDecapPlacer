    enabled: true
    params:
      PWR_IN: +1V2
      PWR_OUT: +1V2_VCCD_PLL
    nets:
      PI_FILTER_C1: '{PWR_IN}'
      PI_FILTER_C2: '{PWR_IN}'
      PI_FILTER_FB: '{PWR_OUT}'
      PI_FILTER_C3: '{PWR_OUT}'
      PI_FILTER_C4: '{PWR_OUT}'

